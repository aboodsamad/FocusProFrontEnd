    <!--
      FocusPro Push Notification Setup
      ─────────────────────────────────
      We register notification_sw.js at scope '/push-sw/' — a scope that is
      SEPARATE from Flutter's flutter_service_worker.js at '/'.
      This prevents Flutter's SW from overwriting ours on every page load.
      Push events are delivered to whichever SW CREATED the subscription,
      so using our own registration means our push handler always runs.

      Dart calls window._focuspro_subscribePush(vapidKey) and polls
      window._focuspro_pushResult for the JSON subscription or {error:'...'}.
    -->
    <script>
      window._focuspro_pushResult = null;

      // Register FocusPro's push SW at '/push-sw/' — completely separate from
      // Flutter's SW at '/'. They coexist without fighting each other.
      var _focuspro_swReg = null;
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/notification_sw.js', { scope: '/push-sw/' })
          .then(function(reg) {
            _focuspro_swReg = reg;
            console.log('[FocusPro] Push SW registered, scope:', reg.scope);
          })
          .catch(function(err) {
            console.warn('[FocusPro] Push SW registration failed:', err);
          });
      }

      // Convert a base64url VAPID key string into a Uint8Array.
      function _focuspro_urlBase64ToUint8Array(base64String) {
        var padding = '='.repeat((4 - base64String.length % 4) % 4);
        var base64  = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
        var raw     = window.atob(base64);
        var output  = new Uint8Array(raw.length);
        for (var i = 0; i < raw.length; ++i) output[i] = raw.charCodeAt(i);
        return output;
      }

      // Called by Dart to create a push subscription using OUR SW (not Flutter's).
      window._focuspro_subscribePush = function(vapidKey) {
        if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
          window._focuspro_pushResult = { error: 'unsupported' };
          return;
        }
        window._focuspro_pushResult = null;

        function doSubscribe(reg) {
          // Always unsubscribe first to clear any stale subscription,
          // then create a fresh one tied to our push SW registration.
          reg.pushManager.getSubscription()
            .then(function(existing) {
              if (existing) {
                return existing.unsubscribe().then(function() { return null; });
              }
              return null;
            })
            .then(function() {
              return reg.pushManager.subscribe({
                userVisibleOnly: true,
                applicationServerKey: _focuspro_urlBase64ToUint8Array(vapidKey)
              });
            })
            .then(function(sub) {
              window._focuspro_pushResult = JSON.parse(JSON.stringify(sub));
              console.log('[FocusPro] Push subscription created, endpoint:', sub.endpoint.substring(0, 40));
            })
            .catch(function(err) {
              window._focuspro_pushResult = { error: String(err) };
              console.warn('[FocusPro] Push subscription failed:', err);
            });
        }

        if (_focuspro_swReg) {
          doSubscribe(_focuspro_swReg);
        } else {
          navigator.serviceWorker.register('/notification_sw.js', { scope: '/push-sw/' })
            .then(function(reg) {
              _focuspro_swReg = reg;
              doSubscribe(reg);
            })
            .catch(function(err) {
              window._focuspro_pushResult = { error: String(err) };
              console.warn('[FocusPro] SW registration failed during subscribe:', err);
            });
        }
      };
    </script>

    <script src="flutter_bootstrap.js" async></script>
  </body>
